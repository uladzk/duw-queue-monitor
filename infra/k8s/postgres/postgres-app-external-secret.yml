apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-app-duw-stats-external-secret
  namespace: default
spec:
  secretStoreRef:
    kind: SecretStore
    name: infisical-secret-store
  refreshInterval: 1h
  target:
    name: postgres-app-duw-stats
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        uri: "postgresql://{{ .username | urlquery }}:{{ .password | urlquery }}@postgres-rw:5432/duw_stats"
  data:
    - secretKey: username
      remoteRef:
        key: /postgres/POSTGRES_USER
    - secretKey: password
      remoteRef:
        key: /postgres/POSTGRES_PASSWORD
