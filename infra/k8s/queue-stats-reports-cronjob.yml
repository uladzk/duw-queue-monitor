apiVersion: batch/v1
kind: CronJob
metadata:
  name: queue-stats-reports-monthly
spec:
  schedule: "0 19 28-31 * *"
  timeZone: "Europe/Warsaw"
  suspend: true
  startingDeadlineSeconds: 600
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: queue-stats-reports
              image: acrduwshared.azurecr.io/queue-stats-reports:1.1.0
              command: ["/bin/sh", "-c"]
              args: ["[ $(date -d @$(($(date +%s) + 86400)) +%d) = '01' ] && exec ./queuestatsreports --period=monthly || echo 'Not last day of month, skipping'"]
              env:
                - name: TZ
                  value: "Europe/Warsaw"
                - name: LOG_LEVEL
                  value: "info"
                - name: STATS_POSTGRES_CONNECTION_STRING
                  valueFrom:
                    secretKeyRef:
                      name: postgres-app-duw-stats
                      key: uri
                - name: NOTIFICATION_TELEGRAM_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: queue-stats-reports-external-secret
                      key: NOTIFICATION_TELEGRAM_BOT_TOKEN
                - name: NOTIFICATION_TELEGRAM_BROADCAST_CHANNEL_NAME
                  valueFrom:
                    secretKeyRef:
                      name: queue-stats-reports-external-secret
                      key: NOTIFICATION_TELEGRAM_BROADCAST_CHANNEL_NAME
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
