name: Lint

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
    - id: checkout
      name: Checkout code
      uses: actions/checkout@v4

    - id: setup-go
      name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25.3'

    - id: lint
      name: Run golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: v2.12.2
